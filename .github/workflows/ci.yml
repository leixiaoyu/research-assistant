name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        # Required for building Pillow from source (no pre-built wheels for Python 3.14 yet)
        sudo apt-get update
        sudo apt-get install -y libjpeg-dev zlib1g-dev libpng-dev libfreetype6-dev

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Debug File Structure
      run: ls -R src

    - name: Run linting (Flake8)
      run: python -m flake8 src/

    - name: Run formatting check (Black)
      run: python -m black --check src/

    - name: Run type checking (Mypy)
      run: python -m mypy src/
        
    - name: Run tests with coverage
      env:
        SEMANTIC_SCHOLAR_API_KEY: "dummy_key_for_ci" # Mock key for tests
      run: |
        # Use python -m pytest to ensure src is in sys.path
        # --cov-branch enables branch coverage (combined line+branch must be ≥99%)
        python -m pytest --cov=src --cov-branch --cov-report=term-missing --cov-fail-under=99 tests/